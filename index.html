<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>
        <link
            rel="shortcut icon"
            href="./assets/icons/Favicon.png"
            type="image/x-icon"
        />
        <link rel="stylesheet" href="./styles/variablen.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body onload="render()">
        <header class="header-top">
            <div class="header-content">
                <img
                    src="./assets/icons/Favicon.png"
                    alt="Bunte Blume mit 4 großen und 4 kleinen Blättern"
                />
                <h2>Fotogram</h2>
            </div>
        </header>
        <main>
            <section class="main-content">
                <h1>My personal photo album</h1>
                <div id="photo-box-content"></div>

                <dialog>
                    <header class="dialog-header">
                        <h2 id="dialog-h2"></h2>
                        <button
                            id="dialogBtn"
                            onclick="endDialog(event)"
                        ></button>
                    </header>

                    <div class="dialog-content" id="dialogContent"></div>

                    <footer class="dialog-footer" id="dialogFooter">
                        <div></div>
                    </footer>
                </dialog>
            </section>
        </main>
        <footer class="footer">
            <div class="footer-upper-part">
                <img
                    src="./assets/icons/DA_Laptop.png"
                    alt="Developer Akademie schrift mit Laptop in roten Linien"
                />
                <h4>
                    Developer <br />
                    Akademie
                </h4>
            </div>
            <div>
                <img
                    src="./assets/icons/© 2023 Developer Akademie GmbH (1).png"
                    alt="Copyright 2023 Developer Akademie GmbH"
                />
            </div>
        </footer>
    </body>
</html>
