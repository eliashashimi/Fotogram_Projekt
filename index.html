<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>
        <link
            rel="shortcut icon"
            href="./assets/icons/Favicon.png"
            type="image/x-icon"
        />
        <link rel="stylesheet" href="./styles/variablen.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="style.css" />
        <script src="template.js" defer ></script>
        <script src="script.js" defer></script>
    </head>
    <body onload="renderBoxes(event)">
        <header class="header-top">
            <div class="header-content">
                <img
                    src="./assets/icons/Favicon.png"
                    alt="Bunte Blume mit 4 großen und 4 kleinen Blättern"
                />
                <h2 aria-label="Page name" >Fotogram</h2>
            </div>
        </header>
        <main aria-labelledby="" class="main-content">
                <h1 aria-label="pageDesciption">My personal photo album</h1>
                <div class="photo-box-content" id="photo-box-content"></div>
                <dialog  id="myDialog" aria-haspopup="dialog" aria-controls="myDialog" aria-labelledby="dialogTitle" aria-describedby="dialogDescr" onclick="endDialog(event)">
                    <div class="event-protection" onclick="eventBubbling(event)">
                    <header class="dialog-header">
                        <h2 class="dialogDescr" id="dialogDescr"></h2>
                        <button class="dialogBtn"
                            id="dialogBtn" aria-label="dialog close" onclick="endDialog(event)"
                        ></button>
                    </header>
                    <div class="dialog-content" id="dialogContent"></div>
                    <footer class="dialog-footer" id="dialogFooter"></footer>
                    </div>
                </dialog>
        </main>
        <footer class="footer">
            <div class="footer-upper-part">
                <img
                    src="./assets/icons/DA_Laptop.png"
                    alt="Developer Akademie schrift mit Laptop in roten Linien"
                />
                <a href="https://developer-akademie.teachable.com" tabindex="0" target="_blank"><h4>
                    Developer <br />
                    Akademie
                </h4></a>
            </div>
            <div>
                <img
                    src="./assets/icons/© 2023 Developer Akademie GmbH (1).png"
                    alt="Copyright 2023 Developer Akademie GmbH"
                />
            </div>
        </footer>
    </body>
</html>
